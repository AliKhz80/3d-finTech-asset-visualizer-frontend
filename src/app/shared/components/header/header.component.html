<header class="bg-surface-bright dark:bg-surface-container-lowest border-b border-outline-variant flex justify-between items-center px-gutter w-full h-16 fixed top-0 left-0 right-0 z-50 transition-colors duration-200">
  <div class="flex items-center gap-4">
    <!-- Logo + Brand Title -->
    <div class="flex items-center gap-2.5 mr-6 border-r border-outline-variant pr-6">
      <img src="logo.png" class="w-6 h-6 object-contain" alt="Apex Logo" />
      <span class="font-bold text-on-surface tracking-tight text-sm select-none">Apex Visualizer</span>
    </div>

    <!-- Back to Dashboard (Only for Analytics component) -->
    <div *ngIf="showBackButton" class="flex items-center">
      <a class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors mr-4 group text-xs font-semibold" routerLink="/dashboard">
        <span class="material-symbols-outlined text-sm font-bold">arrow_back</span>
        <span>Back to Dashboard</span>
      </a>
    </div>

    <!-- Live Feed Status (Only for Dashboard component) -->
    <div *ngIf="showLiveFeed" class="flex items-center gap-2 text-on-surface-variant mr-4">
      <span class="inline-flex relative h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
      </span>
      <span class="text-label-md font-bold uppercase tracking-widest text-xs">Live Feed</span>
    </div>

    <!-- Theme Toggle Icon Button -->
    <button (click)="toggleTheme()" class="flex items-center justify-center p-1.5 rounded-full hover:bg-surface-container transition-all cursor-pointer text-on-surface-variant hover:text-primary ml-1" aria-label="Toggle Theme">
      <span class="material-symbols-outlined text-base">
        {{ isDarkMode() ? 'light_mode' : 'dark_mode' }}
      </span>
    </button>
  </div>

  <!-- Assets Tickers -->
  <div class="hidden lg:flex gap-8 items-center">
    <span class="text-on-surface-variant hover:text-primary transition-colors cursor-default font-mono-data text-xs">BTC/USD $64,231</span>
    <span class="text-on-surface-variant hover:text-primary transition-colors cursor-default font-mono-data text-xs">ETH/USD $3,412</span>
    <span class="text-on-surface-variant hover:text-primary transition-colors cursor-default font-mono-data text-xs">SPX 5,214</span>
  </div>
</header>
